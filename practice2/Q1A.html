<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .heading {
        font: 3em "Arial narrow";
      }
      .content::first-letter {
        font: 1.5em "Monospace";
        font-weight: bolder;
        color: blue;
        background-color: yellow;
      }
      .names {
        font: 1.5em "serif";
        font-weight: bolder;
      }
    </style>
  </head>
  <body>
    <span class="heading">Quotes</span>
    <p class="content">
      There is nothing like a dream to create the future
      <span class="names">-- Victor Hugo</span>
    </p>
    <br /><br />
    <hr />
    <br /><br />
    (without CSS)
    <br /><br />
    <h1>Quotes</h1>
    <p>There is nothing like a dream to create the future -- Victor Hugo</p>
  </body>
</html>
