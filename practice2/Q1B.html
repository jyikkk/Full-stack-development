<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .mouseOverMe:hover
    {
        background-color: lightgrey;
    }
    .toolTip
    {
        visibility: hidden;
        background-color: goldenrod;
    }
    .mouseOverMe:hover .toolTip
    {
        visibility: visible;
    }
    </style>
</head>
<body>
 <br /><br />
 <p class="mouseOverMe">
 Idealism increases in direct proportion to one's distance from the problem <span
class="toolTip">-- John Galsworthy</span>
 </p>
 <br /><br />
 <hr />
 <br /><br />
 (without CSS)

 <p>
 Idealism increases in direct proportion to one's distance from the problem -- John
Galsworthy
</p>
</body>
</html>
